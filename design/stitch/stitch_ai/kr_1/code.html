<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
        
        /* Holographic Scanning Animation */
        @keyframes scan-line {
            0% { transform: translateY(-100%); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(100vh); opacity: 0; }
        }
        .animate-scan {
            animation: scan-line 3s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        @keyframes progress-fill {
            0% { width: 0%; }
            50% { width: 70%; }
            100% { width: 85%; }
        }
        .animate-progress {
            animation: progress-fill 2s ease-out forwards;
        }
    </style>
</head>
<body class="bg-black h-screen w-screen overflow-hidden relative font-body-md text-body-md antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<!-- Viewfinder Background -->
<div class="absolute inset-0 z-0 bg-black">
<img alt="" class="w-full h-full object-cover opacity-90" src="https://lh3.googleusercontent.com/aida/ADBb0ugYIr7g0-oKrK-k17JvxWfBfQZOOkrxTbEP3lPFM7VhN9JnRG2YSU2oRolzKUNh1yCMqgK45K7yoI3rS71rvxnz6BbMhKiVM6f6spI7KIw9rLkIbd1YvFGMkl5C3aL053_Xuwll-Drd9i80YcvUsYCpLgP-ahNIoRFYcskdA8E6In5-p-gYcFuBhg5vo7jZRc4Cwy-Lf9MRsIJR9jPRtrv7RwBOq4GikHERP4_59-_xgJvnj-RdchZSBI1Y"/>
<!-- Center Reticle -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="w-64 h-64 border-2 border-primary-fixed/50 rounded-3xl relative">
<!-- Corner accents -->
<div class="absolute top-0 left-0 w-6 h-6 border-t-4 border-l-4 border-primary-fixed rounded-tl-xl"></div>
<div class="absolute top-0 right-0 w-6 h-6 border-t-4 border-r-4 border-primary-fixed rounded-tr-xl"></div>
<div class="absolute bottom-0 left-0 w-6 h-6 border-b-4 border-l-4 border-primary-fixed rounded-bl-xl"></div>
<div class="absolute bottom-0 right-0 w-6 h-6 border-b-4 border-r-4 border-primary-fixed rounded-br-xl"></div>
</div>
</div>
<!-- Scanning Line Overlay -->
<div class="absolute top-0 left-0 w-full h-[2px] bg-primary-fixed shadow-[0_0_15px_rgba(176,240,214,0.8)] animate-scan pointer-events-none z-10"></div>
<!-- Ambient Data Overlay -->
<div class="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-black/40 z-0 pointer-events-none"></div>
</div>
<!-- Task-Focused Top Header -->
<header class="absolute top-0 w-full z-20 flex justify-between items-center px-gutter py-6">
<button aria-label="Close Camera" class="w-12 h-12 rounded-full bg-surface/20 backdrop-blur-md border border-white/30 flex items-center justify-center text-white hover:bg-surface/30 transition-colors shadow-lg">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">close</span>
</button>
<button aria-label="Toggle Flash" class="w-12 h-12 rounded-full bg-surface/20 backdrop-blur-md border border-white/30 flex items-center justify-center text-white hover:bg-surface/30 transition-colors shadow-lg">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">flash_on</span>
</button>
</header>
<!-- Camera Controls (Background Layer relative to Sheet) -->
<div class="absolute bottom-40 w-full z-10 flex justify-center items-center gap-8 px-8 opacity-50 blur-sm pointer-events-none transition-all duration-500">
<button class="w-14 h-14 rounded-full bg-surface/20 backdrop-blur-md border border-white/30 flex items-center justify-center text-white">
<span class="material-symbols-outlined">photo_library</span>
</button>
<button class="w-20 h-20 rounded-full border-4 border-white/50 flex items-center justify-center p-1">
<div class="w-full h-full bg-white rounded-full"></div>
</button>
<button class="w-14 h-14 rounded-full bg-surface/20 backdrop-blur-md border border-white/30 flex items-center justify-center text-white">
<span class="material-symbols-outlined">cameraswitch</span>
</button>
</div>
<!-- Scanning Bottom Sheet -->
<div class="absolute bottom-0 left-0 w-full z-30 px-margin-mobile md:px-margin-desktop pb-margin-mobile flex justify-center">
<div class="w-full max-w-[600px] bg-surface/80 dark:bg-surface-container/80 backdrop-blur-2xl rounded-xl border border-white/40 shadow-[0_-10px_40px_rgba(0,53,39,0.2)] p-8 flex flex-col gap-stack-md transform translate-y-0 transition-transform duration-500 ease-out">
<div class="flex items-center justify-between">
<div class="flex flex-col">
<h2 class="font-headline-md text-headline-md text-primary">반서개 중...</h2>
<p class="font-body-md text-body-md text-on-surface-variant mt-1">시겨물 구죠랄 반서가하고 기스ᄆ니다</p>
</div>
<div class="w-14 h-14 rounded-full bg-secondary-container flex items-center justify-center animate-pulse shadow-inner border border-white/50">
<span class="material-symbols-outlined text-on-secondary-container" style="font-variation-settings: 'FILL' 1;">psychology</span>
</div>
</div>
<!-- Progress Indicator -->
<div class="w-full h-2 bg-surface-variant rounded-full overflow-hidden shadow-inner">
<div class="h-full bg-primary rounded-full animate-progress relative">
<!-- Shimmer effect on progress bar -->
<div class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/30 to-transparent -translate-x-full animate-[shimmer_1.5s_infinite]"></div>
</div>
</div>
<!-- Live Data Chips -->
<div class="flex flex-wrap gap-3 mt-2">
<div class="flex items-center gap-2 px-4 py-2 rounded-full bg-primary-fixed-dim/20 border border-primary/20 shadow-sm backdrop-blur-sm">
<span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
<span class="font-label-md text-label-md text-primary tracking-wide">몬스테라 데ᄅ리시오사</span>
</div>
<div class="flex items-center gap-2 px-4 py-2 rounded-full bg-surface-variant/50 border border-outline-variant/30 text-on-surface-variant">
<span class="material-symbols-outlined text-[16px]">water_drop</span>
<span class="font-label-md text-label-md">가ᄂ강 상태 해ᄀ기ᄂ 중...</span>
</div>
</div>
</div>
</div>
</body></html>
