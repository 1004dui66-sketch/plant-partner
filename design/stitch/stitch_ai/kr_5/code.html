<body class="min-h-screen text-on-surface antialiased flex items-center justify-center p-4">
<!-- Main Content Container -->
<main class="w-full max-w-2xl mx-auto z-10 relative">
<!-- Glassmorphism Card -->
<div class="glass-panel rounded-xl p-8 md:p-12">
<!-- Header -->
<header class="flex items-center justify-between mb-stack-lg">
<div>
<h1 class="font-headline-lg text-headline-lg text-primary mb-2">활동 기록</h1>
<p class="font-body-lg text-body-lg text-on-surface-variant flex items-center gap-2">
<span class="material-symbols-outlined text-primary" style="font-variation-settings: 'FILL' 1;">potted_plant</span>
                        Monstera Deliciosa
                    </p>
</div>
<!-- Close Button (mock back action) -->
<button class="w-12 h-12 rounded-full flex items-center justify-center bg-surface/50 hover:bg-surface transition-colors border border-outline-variant/30 text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="close">close</span>
</button>
</header>
<form action="#" class="space-y-stack-md" method="POST">
<!-- Activity Selection -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-stack-sm uppercase">                활동 유형</label>
<div class="grid grid-cols-2 md:grid-cols-4 gap-4">
<!-- Water -->
<button class="activity-btn selected flex flex-col items-center justify-center p-4 rounded-lg bg-surface/50 border border-outline-variant/50 hover:bg-surface transition-all duration-200 gap-2" type="button">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">water_drop</span>
<span class="font-label-md text-label-md">물 주기</span>
</button>
<!-- Fertilize -->
<button class="activity-btn flex flex-col items-center justify-center p-4 rounded-lg bg-surface/50 border border-outline-variant/50 hover:bg-surface transition-all duration-200 gap-2" type="button">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 0;">science</span>
<span class="font-label-md text-label-md">                영양제</span>
</button>
<!-- Prune -->
<button class="activity-btn flex flex-col items-center justify-center p-4 rounded-lg bg-surface/50 border border-outline-variant/50 hover:bg-surface transition-all duration-200 gap-2" type="button">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 0;">content_cut</span>
<span class="font-label-md text-label-md">                가지치기</span>
</button>
<!-- Repot -->
<button class="activity-btn flex flex-col items-center justify-center p-4 rounded-lg bg-surface/50 border border-outline-variant/50 hover:bg-surface transition-all duration-200 gap-2" type="button">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 0;">home_work</span>
<span class="font-label-md text-label-md">                분갈이</span>
</button>
</div>
</div>
<!-- Date & Time -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-6">
<div>
<label class="block font-label-md text-label-md text-on-surface mb-stack-sm uppercase" for="date">날짜</label>
<div class="relative">
<input class="w-full bg-surface/50 border border-outline-variant/50 rounded-lg py-3 px-4 font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-colors glass-panel" id="date" name="date" type="date" value="2023-10-27"/>
</div>
</div>
<div>
<label class="block font-label-md text-label-md text-on-surface mb-stack-sm uppercase" for="time">시간</label>
<div class="relative">
<input class="w-full bg-surface/50 border border-outline-variant/50 rounded-lg py-3 px-4 font-body-md text-body-md text-on-surface focus:ring-2 focus:ring-primary focus:border-primary transition-colors glass-panel" id="time" name="time" type="time" value="09:00"/>
</div>
</div>
</div>
<!-- Notes -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-stack-sm uppercase" for="notes">메모 (선택 사항)</label>
<textarea class="w-full bg-surface/50 border border-outline-variant/50 rounded-lg py-3 px-4 font-body-md text-body-md text-on-surface placeholder:text-outline focus:ring-2 focus:ring-primary focus:border-primary transition-colors glass-panel resize-none" id="notes" name="notes" placeholder="                                                                 식물의 상태는 어떤가요? 새로운 성장이 보이나요?" rows="4"></textarea>
</div>

<div class="pt-4">
<button class="w-full bg-primary text-on-primary font-label-md text-label-md uppercase tracking-wider py-4 rounded-full hover:bg-primary-container hover:text-on-primary-container transition-colors duration-300 shadow-md" type="submit">기록 저장</button>
</div>

<script>
        // Simple script to handle activity button selection visual state
        document.addEventListener('DOMContentLoaded', () => {
            const buttons = document.querySelectorAll('.activity-btn');
            buttons.forEach(btn => {
                btn.addEventListener('click', () => {
                    buttons.forEach(b => {
                        b.classList.remove('selected');
                        // Reset fill state for unselected
                        const icon = b.querySelector('.material-symbols-outlined');
                        if(icon) icon.style.fontVariationSettings = "'FILL' 0";
                    });
                    
                    btn.classList.add('selected');
                    // Set fill state for selected
                    const icon = btn.querySelector('.material-symbols-outlined');
                    if(icon) icon.style.fontVariationSettings = "'FILL' 1";
                });
            });
            
            // Set today's date dynamically
            const dateInput = document.getElementById('date');
            const today = new Date();
            const yyyy = today.getFullYear();
            let mm = today.getMonth() + 1; // Months start at 0!
            let dd = today.getDate();

            if (dd < 10) dd = '0' + dd;
            if (mm < 10) mm = '0' + mm;

            const formattedToday = yyyy + '-' + mm + '-' + dd;
            dateInput.value = formattedToday;
        });
    </script>
