<style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 10px 30px rgba(0, 53, 39, 0.05);
        }
        .glass-input {
            background: rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            transition: all 0.3s ease;
        }
        .glass-input:focus {
            background: rgba(255, 255, 255, 0.8);
            border-color: #707974; /* outline color */
            outline: none;
            box-shadow: 0 0 0 2px rgba(0, 53, 39, 0.1);
        }
        .glass-button-secondary {
            background: rgba(195, 236, 215, 0.2); /* secondary-fixed with opacity */
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transition: all 0.2s ease;
        }
        .glass-button-secondary:hover {
            background: rgba(195, 236, 215, 0.4);
        }
        
        .bg-image-cover {
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
        }

<body class="bg-background text-on-background min-h-screen flex items-center justify-center relative overflow-hidden font-body-md">
<!-- Background Image -->
<div class="absolute inset-0 bg-image-cover z-0 filter blur-sm scale-105" style="background-image: url('https://lh3.googleusercontent.com/aida/ADBb0ugYIr7g0-oKrK-k17JvxWfBfQZOOkrxTbEP3lPFM7VhN9JnRG2YSU2oRolzKUNh1yCMqgK45K7yoI3rS71rvxnz6BbMhKiVM6f6spI7KIw9rLkIbd1YvFGMkl5C3aL053_Xuwll-Drd9i80YcvUsYCpLgP-ahNIoRFYcskdA8E6In5-p-gYcFuBhg5vo7jZRc4Cwy-Lf9MRsIJR9jPRtrv7RwBOq4GikHERP4_59-_xgJvnj-RdchZSBI1Y');"></div>
<div class="absolute inset-0 bg-gradient-to-b from-white/20 to-surface/80 z-0"></div>
<!-- Main Container -->
<main class="relative z-10 w-full max-w-md px-margin-mobile md:px-0">
<!-- Glassmorphism Card -->
<div class="glass-panel rounded-xl p-[32px] flex flex-col items-center">
<!-- Brand Logo -->
<div class="mb-stack-lg text-center">
<h1 class="font-headline-lg text-headline-lg text-primary tracking-tight">Plant Buddy</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-stack-sm">시ᄀ마라나마 래사가가래가 더하다</p>
</div>
<!-- Login Form -->
<form action="#" class="w-full space-y-stack-md" method="POST">
<!-- Email Input -->
<div class="relative">
<label class="sr-only" for="email">기메기래 주소</label>
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">mail</span>
</div>
<input autocomplete="email" class="glass-input block w-full pl-12 pr-4 py-3 rounded-DEFAULT font-body-md text-body-md text-on-surface placeholder-outline focus:ring-0" id="email" name="email" placeholder="기메기래 주소" required="" type="email"/>
</div>
<!-- Password Input -->
<div class="relative">
<label class="sr-only" for="password">비미퍼ᄂ호</label>
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline">lock</span>
</div>
<input autocomplete="current-password" class="glass-input block w-full pl-12 pr-4 py-3 rounded-DEFAULT font-body-md text-body-md text-on-surface placeholder-outline focus:ring-0" id="password" name="password" placeholder="비미퍼ᄂ호" required="" type="password"/>
<div class="absolute inset-y-0 right-0 pr-4 flex items-center">
<a class="font-label-md text-label-md text-primary hover:text-primary-container transition-colors" href="#">비미퍼ᄂ호 차고기</a>
</div>
</div>
<!-- Primary Button -->
<button class="w-full bg-primary hover:bg-primary-container text-on-primary font-label-md text-label-md py-4 rounded-DEFAULT transition-all duration-200 shadow-sm hover:shadow-md transform hover:-translate-y-0.5" type="submit">
                    로겨기나
                </button>
</form>
<!-- Divider -->
<div class="w-full flex items-center my-stack-md">
<div class="flex-grow border-t border-outline-variant/50"></div>
<span class="mx-4 font-label-md text-label-md text-outline">툐나나 다으마 계저다로 게소ᄀ하기</span>
<div class="flex-grow border-t border-outline-variant/50"></div>
</div>
<!-- Social Logins -->
<div class="w-full grid grid-cols-2 gap-4 mb-stack-md">
<button class="glass-button-secondary flex items-center justify-center py-3 rounded-DEFAULT text-on-surface font-label-md text-label-md" type="button">

                </button>
<button class="glass-button-secondary flex items-center justify-center py-3 rounded-DEFAULT text-on-surface font-label-md text-label-md" type="button">
<svg class="w-5 h-5 mr-2" fill="currentColor" viewbox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2C6.477 2 2 6.477 2 12c0 4.991 3.657 9.128 8.438 9.878v-6.987h-2.54V12h2.54V9.797c0-2.506 1.492-3.89 3.777-3.89 1.094 0 2.238.195 2.238.195v2.46h-1.26c-1.243 0-1.63.771-1.63 1.562V12h2.773l-.443 2.89h-2.33v6.988C18.343 21.128 22 16.991 22 12c0-5.523-4.477-10-10-10z"></path></svg>
                    애프타
                </button>
</div>
<!-- Sign Up Link -->
<div class="text-center">
<span class="font-body-md text-body-md text-on-surface-variant">가저다가 어보시ᄂ가요?</span>
<a class="font-label-md text-label-md text-primary hover:text-primary-container ml-1 hover:underline transition-all" href="#">홰워ᄂ가이파</a>
